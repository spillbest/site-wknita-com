<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex,nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="refresh" content="0;url=https://api.wknita.com/login">
<title>Redirect</title>
<script>
(() => {
  const target = new URL('https://api.wknita.com/login');
  target.search = window.location.search;
  target.hash = window.location.hash;
  window.location.replace(target.toString());
})();
</script>
</head>
<body>
<main>
<h1>Reindirizzamento in corso</h1>
<p>Se il redirect non parte automaticamente, <a href="https://api.wknita.com/login" rel="sponsored nofollow noopener">apri il sito</a>.</p>
</main>
</body>
</html>
